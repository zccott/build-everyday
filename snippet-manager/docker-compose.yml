version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=snippets
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - 5432

  backend:
    build: ./backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/snippets
      - SECRET_KEY=your-super-secret-key-for-docker
    depends_on:
      - db
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
